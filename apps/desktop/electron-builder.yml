appId: com.satorien.slidegen
productName: Slide Generator
copyright: Copyright © 2026 Satorien
# workspace で hoist された electron をビルダーが解決できるよう明示
electronVersion: 42.4.1

directories:
  output: dist
  buildResources: build

# out/ は electron-vite の成果物。main は @slidegen/core をバンドル済みなので
# 実行時に必要なのは externalize した依存(marp-core 等)のみ。
files:
  - out/**
  - package.json
  - "!**/*.map"

asar: true

# 自動更新 / 配布先(GitHub Releases)
publish:
  provider: github
  owner: Satorien
  repo: slide-gen

win:
  target:
    - target: nsis
    - target: portable
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch: universal
  category: public.app-category.productivity
  icon: build/icon.icns
  # 未署名配布(v1)。証明書を用意したら hardenedRuntime/notarize を有効化する。

linux:
  target:
    - target: AppImage
    - target: deb
  category: Office
  icon: build/icon.png
